<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <title>Validador</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 2rem;
    }

    input {
      display: block;
      margin: 0.5rem 0;
      padding: 0.4rem;
      width: 250px;
    }

    p {
      margin: 0.2rem 0 1rem 0;
      color: red;
    }

    p.ok {
      color: green;
    }

    button {
      margin-top: 0.5rem;
      padding: 0.4rem 1rem;
    }
  </style>
</head>

<body>

  <h1>Formulario de Registro</h1>

  <label for="email">Email</label>
  <input type="text" id="email" placeholder="usuario@email.com" />
  <p id="msg-email"></p>

  <label for="password">Contraseña</label>
  <input type="password" id="password" placeholder="Mínimo 8 caracteres" />
  <p id="msg-password"></p>

  <button onclick="validar()">Enviar</button>
  <p id="msg-resultado"></p>

  <script type="module">
    import { validarEmail, validarPassword } from "./src/validador.js";

    window.validar = function () {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      const okEmail = validarEmail(email);
      const okPassword = validarPassword(password);

      const msgEmail = document.getElementById("msg-email");
      const msgPassword = document.getElementById("msg-password");
      const msgResultado = document.getElementById("msg-resultado");

      msgEmail.textContent = okEmail ? "Email válido" : "Email inválido";
      msgEmail.className = okEmail ? "ok" : "";

      msgPassword.textContent = okPassword ? "Contraseña válida" : "Contraseña inválida";
      msgPassword.className = okPassword ? "ok" : "";
    };
  </script>

</body>

</html>
