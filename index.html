<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <title>Validador</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 2rem;
    }

    input {
      display: block;
      margin: 0.5rem 0;
      padding: 0.4rem;
      width: 250px;
    }

    p {
      margin: 0.2rem 0 1rem 0;
      color: red;
    }

    p.ok {
      color: green;
    }

    button {
      margin-top: 0.5rem;
      padding: 0.4rem 1rem;
    }

    footer {
      margin-top: 2rem;
      color: #000000;
      font-size: 0.8rem;
    }
  </style>
</head>

<body>

  <h1>Formulario de Validar Emails y Contraseñas</h1>

  <label for="email">Email</label>
  <input type="text" id="email" placeholder="usuario@email.com" />
  <p id="msg-email"></p>

  <label for="password">Contraseña</label>
  <input type="password" id="password" placeholder="Mínimo 8 caracteres" />
  <p id="msg-password">*Mínimo 8 caracteres, una mayúscula y un número</p>

  <button onclick="validar()">Enviar</button>
  <p id="msg-resultado"></p>

  <script>
    async function validar() {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      const msgEmail = document.getElementById("msg-email");
      const msgPassword = document.getElementById("msg-password");
      const msgResultado = document.getElementById("msg-resultado");

      // Limpiar mensajes anteriores
      msgEmail.textContent = "";
      msgPassword.textContent = "";
      msgResultado.textContent = "Validando...";
      msgResultado.className = "";

      try {
        // POST a la API Express/Vercel
        const response = await fetch("/api/validar", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password })
        });

        const data = await response.json();

        // Mostrar resultado por campo
        msgEmail.textContent = data.emailValido ? "Email válido" : "Email inválido";
        msgEmail.className = data.emailValido ? "ok" : "";

        msgPassword.textContent = data.passwordValida ? "Contraseña válida" : "Contraseña inválida";
        msgPassword.className = data.passwordValida ? "ok" : "";

        // Mostrar resultado general
        msgResultado.textContent = data.mensaje;
        msgResultado.className = (data.emailValido && data.passwordValida) ? "ok" : "";

      } catch (err) {
        msgResultado.textContent = "Error al conectar con la API: " + err.message;
      }
    }
  </script>

  <footer>Ivo Sodja · Legajo 27440 · Resistencia, Chaco</footer>

</body>

</html>
