sonar.projectKey=ivobsj_ICS-2doParcial
sonar.organization=ivobsj

# Código fuente a analizar
sonar.sources=src,api

# Archivos de test (SonarCloud los trata distinto)
sonar.tests=src
sonar.test.inclusions=**/*.test.js

# Excluir carpetas que no son código propio
sonar.exclusions=node_modules/**,dist/**

# Reporte de cobertura generado por Jest
sonar.javascript.lcov.reportPaths=coverage/lcov.info
