sonar.projectKey=ivobsj_ICS-2doParcial
sonar.organization=ivobsj

# Código fuente a analizar
sonar.sources=src,api

# Archivos de test (SonarCloud los trata distinto)
sonar.tests=src,api
sonar.test.inclusions=**/*.test.js,**/*.test.ts

# Excluir archivos que no son código de aplicación
sonar.exclusions=node_modules/**,dist/**,build.js,specs/**

# Reporte de cobertura generado por Jest
sonar.javascript.lcov.reportPaths=coverage/lcov.info
