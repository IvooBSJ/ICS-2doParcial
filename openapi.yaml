openapi: "3.0.0"
info:
  title: API Validador
  version: "1.0.0"
  description: |
    API REST para validar datos de registro de usuario.
    Especificación escrita antes de la implementación (Spec Driven Development).

servers:
  - url: http://localhost:3000
    description: Entorno de desarrollo local
  - url: https://ics-2do-parcial.vercel.app
    description: Entorno de entrega (Vercel)

paths:
  /api/validar:
    post:
      summary: Valida email y contraseña
      description: |
        Recibe un email y una contraseña, y devuelve el resultado de la validación.
        - El email debe tener formato válido (usuario@dominio.ext)
        - La contraseña debe tener al menos 8 caracteres, una mayúscula y un número
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  description: Email del usuario a registrar
                  example: "usuario@gmail.com"
                password:
                  type: string
                  description: Contraseña del usuario (mín. 8 caracteres, 1 mayúscula, 1 número)
                  example: "Segura123"
      responses:
        "200":
          description: Resultado de la validación
          content:
            application/json:
              schema:
                type: object
                properties:
                  emailValido:
                    type: boolean
                    description: true si el email tiene formato válido
                    example: true
                  passwordValida:
                    type: boolean
                    description: true si la contraseña cumple los requisitos
                    example: true
                  mensaje:
                    type: string
                    description: Descripción del resultado del registro
                    example: "Registro exitoso"
              examples:
                exitoso:
                  summary: Datos válidos
                  value:
                    emailValido: true
                    passwordValida: true
                    mensaje: "Registro exitoso"
                emailInvalido:
                  summary: Email inválido
                  value:
                    emailValido: false
                    passwordValida: true
                    mensaje: "Email inválido"
                passwordInvalida:
                  summary: Password inválida
                  value:
                    emailValido: true
                    passwordValida: false
                    mensaje: "Contraseña inválida"
                ambosInvalidos:
                  summary: Ambos inválidos
                  value:
                    emailValido: false
                    passwordValida: false
                    mensaje: "Email y contraseña inválidos"
        "400":
          description: Body inválido o campos faltantes
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "Email y password son requeridos"
        "405":
          description: Método HTTP no permitido
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "Método no permitido"
